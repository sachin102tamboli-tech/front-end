<!DOCTYPE html>
<html>
    <head>
        <title>POST Crud</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" 
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" 
        crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="./assets/css/style.css">
    </head>
    <body>

        <div class="container mt-5">
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <div class="card">
                        <div class="card-body">
                            <form id="postForm">
                                <div class="form-group">
                                    <label for="title" class="font-weight-bold">Title*</label>
                                    <input type="text" class="form-control" id="title" required>
                                    
                                </div>

                                <div class="form-group">
                                    <label for="body" class="font-weight-bold">Comment*</label>
                                    <textarea rows="4" id="body" class="form-control" required></textarea>
                                </div>
                                

                             
                               <button class="btn btn-sm btn-block btn-primary" id="addPost">Add Comment</button>
                               <button type="button" class="btn btn-sm btn-block btn-primary d-none" id="updtPost">Update Comment</button>
                                
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4" id="postContainer">
                
            </div>
        </div>
    <div class="spinner d-none" id="spinner">
        <div class="spinner-border text-danger" role="status"></div>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
        <script src="./assets/js/app.js"></script>
    </body>

</html>
